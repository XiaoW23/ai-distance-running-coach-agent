<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能中长跑周期化训练与负荷监控 Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 自定义主聊天框滚动条 */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        #chat-box::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .typing-indicator::after {
            content: '▌';
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Markdown 样式 */
        .markdown-body { font-size: 0.95rem; line-height: 1.6; word-wrap: break-word; }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .markdown-body h3 { font-size: 1.125rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
        .markdown-body strong { font-weight: 600; color: #0f172a; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; margin-bottom: 1rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #cbd5e1; padding: 0.5rem; }
        .markdown-body th { background-color: #f8fafc; font-weight: 600; text-align: left; }
        .markdown-body pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 0.75rem; }
        .markdown-body code { font-family: ui-monospace, monospace; font-size: 0.875em; }
        .markdown-body p>code, .markdown-body li>code, .markdown-body td>code { background-color: #e2e8f0; color: #ef4444; padding: 0.125rem 0.25rem; border-radius: 0.25rem; }

        /* 隐藏右侧时间轴的原生滚动条以提升高级感 */
        .scrollbar-hide::-webkit-scrollbar { display: none !important; }
        .scrollbar-hide { -ms-overflow-style: none !important; scrollbar-width: none !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-slate-50 to-sky-200 h-screen flex font-sans text-slate-800 overflow-x-hidden overflow-y-hidden bg-fixed">

    <aside id="sidebar" class="w-64 bg-white/40 backdrop-blur-xl border-r border-white/50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] flex flex-col hidden md:flex z-30 relative h-full transition-all duration-300 overflow-hidden shrink-0">
        <div class="p-4 border-b border-white/40 flex items-center justify-between h-16 shrink-0 relative">
            <div class="flex items-center gap-3 overflow-hidden font-bold text-lg text-slate-800 w-full">
                <button id="sidebar-toggle-btn" class="flex items-center justify-center p-1 rounded-lg text-blue-600 hover:bg-blue-100/50 transition-all outline-none group relative shrink-0" title="点击展开侧边栏">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 transition-transform duration-300 group-hover:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    <span id="expand-tooltip" class="absolute left-10 bg-slate-800 text-white text-xs px-2 py-1 rounded opacity-0 pointer-events-none transition-opacity duration-300 whitespace-nowrap hidden group-hover:opacity-100 z-50">展开侧边栏 ⏩</span>
                </button>
                <span id="sidebar-title-text" class="whitespace-nowrap transition-opacity duration-200 select-none">中长跑 AI 教练</span>
            </div>
            <button id="collapse-sidebar-btn" class="text-slate-400 hover:text-slate-700 p-1.5 rounded-lg hover:bg-white/50 transition-all outline-none shrink-0" title="收起侧边栏">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                </svg>
            </button>
        </div>

        <div class="p-4 border-b border-white/40 flex justify-center items-center shrink-0">
            <button id="new-chat-btn" class="w-full bg-blue-600/90 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-xl shadow-md transition-all duration-300 flex items-center justify-center gap-2 backdrop-blur-md overflow-hidden whitespace-nowrap">
                <svg class="shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                <span id="new-chat-btn-text" class="btn-text transition-opacity duration-200">新建对话</span>
            </button>
        </div>

        <div id="session-list" class="flex-1 overflow-y-auto p-3 space-y-1 scrollbar-hide transition-opacity duration-300"></div>
    </aside>

    <div class="flex-1 flex flex-col h-full relative">
        <button id="menu-btn" class="md:hidden absolute top-4 left-4 text-slate-600 hover:text-blue-600 transition-colors z-20 bg-white/80 p-1.5 rounded-md shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>

        <main class="flex-1 max-w-4xl w-full mx-auto p-4 pt-12 md:pt-4 flex flex-col h-full relative">
            
            <div id="chat-box" class="flex-1 bg-white/30 backdrop-blur-xl rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.05)] border border-white/50 p-4 overflow-y-auto mb-4 flex flex-col gap-4 relative"></div>

            <button id="scroll-bottom-btn" class="absolute bottom-48 right-8 w-10 h-10 bg-white/90 border border-slate-200 shadow-xl backdrop-blur-md rounded-full flex items-center justify-center text-slate-600 hover:text-blue-600 hover:scale-105 transition-all duration-300 opacity-0 pointer-events-none z-20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                </svg>
            </button>

            <div id="timeline-nav" class="hidden md:flex flex-col absolute -right-6 top-4 bottom-28 w-4 overflow-y-auto items-center gap-3 z-10 scrollbar-hide py-2 select-none"></div>

            <div class="bg-white/50 backdrop-blur-lg rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.05)] border border-white/50 p-3 relative z-20 shrink-0">
                <div class="mb-2 flex items-center gap-2 text-sm">
                    <label for="csv-upload" class="cursor-pointer bg-white/70 hover:bg-white backdrop-blur-sm text-slate-700 py-1.5 px-3 rounded-lg flex items-center gap-1 transition-colors border border-white/50 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
                        上传 Coros 数据 (CSV)
                    </label>
                    <input type="file" id="csv-upload" accept=".csv" class="hidden" multiple />
                    <span id="file-status" class="text-slate-500 italic hidden">未选择文件</span>
                    <button id="clear-file" class="hidden text-red-500 hover:text-red-700 ml-1" title="清除已选择的文件">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                <div class="flex items-end gap-2">
                    <textarea id="user-input" class="flex-1 bg-white/60 backdrop-blur-sm border border-white/50 rounded-xl p-3 resize-none focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white/80 transition-all min-h-[60px] max-h-[120px]" placeholder="描述你的训练感受或提问... (按 Enter 发送，Shift+Enter 换行)"></textarea>
                    <button id="send-btn" class="bg-blue-600/90 hover:bg-blue-600 backdrop-blur-md text-white font-medium py-3 px-6 rounded-xl shadow-lg transition-colors flex items-center gap-2 h-[60px]">
                        发送
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const timelineNav = document.getElementById('timeline-nav');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const csvUpload = document.getElementById('csv-upload');
        const fileStatus = document.getElementById('file-status');
        const clearFileBtn = document.getElementById('clear-file');
        const sidebar = document.getElementById('sidebar');
        const collapseBtn = document.getElementById('collapse-sidebar-btn');
        const toggleBtn = document.getElementById('sidebar-toggle-btn');

        let currentMessages = [];
        let csvStringData = "";
        let currentFileNames = [];
        let currentThreadId = null;
        let messageCount = 0;
        let autoScrollEnabled = true;
        let isGenerating = false;
        let isSidebarCollapsed = false;

        /* ========== 侧边栏伸缩逻辑 ========== */
        function toggleSidebar() {
            isSidebarCollapsed = !isSidebarCollapsed;
            const sidebarTitleText = document.getElementById('sidebar-title-text');
            const newChatBtn = document.getElementById('new-chat-btn');
            const newChatBtnText = document.getElementById('new-chat-btn-text');
            const sessionList = document.getElementById('session-list');
            const expandTooltip = document.getElementById('expand-tooltip');

            if (isSidebarCollapsed) {
                // 彻底斩断溢出：先隐藏文字内容，再缩小框体
                sidebarTitleText.classList.add('opacity-0', 'hidden');
                newChatBtnText.classList.add('hidden');
                sessionList.classList.add('opacity-0', 'hidden');
                collapseBtn.classList.add('hidden');
                expandTooltip.classList.remove('hidden');

                setTimeout(() => {
                    sidebar.classList.remove('w-64');
                    sidebar.classList.add('w-16');
                    newChatBtn.classList.remove('w-full', 'py-2', 'px-4', 'rounded-xl');
                    newChatBtn.classList.add('w-10', 'h-10', 'rounded-full', 'p-0');
                }, 10);
            } else {
                sidebar.classList.remove('w-16');
                sidebar.classList.add('w-64');
                collapseBtn.classList.remove('hidden');
                expandTooltip.classList.add('hidden');
                
                newChatBtn.classList.remove('w-10', 'h-10', 'rounded-full', 'p-0');
                newChatBtn.classList.add('w-full', 'py-2', 'px-4', 'rounded-xl');

                // 等边框拉宽后，再显示内部内容
                setTimeout(() => {
                    sidebarTitleText.classList.remove('hidden');
                    setTimeout(() => sidebarTitleText.classList.remove('opacity-0'), 10);
                    newChatBtnText.classList.remove('hidden');
                    sessionList.classList.remove('hidden');
                    setTimeout(() => sessionList.classList.remove('opacity-0'), 10);
                }, 200); 
            }
        }
        
        if (collapseBtn) collapseBtn.addEventListener('click', toggleSidebar);
        if (toggleBtn) toggleBtn.addEventListener('click', () => { if (isSidebarCollapsed) toggleSidebar(); });

        /* ========== 智能跟滚逻辑 ========== */
        function updateScrollBtn() {
            const btn = document.getElementById('scroll-bottom-btn');
            if (btn) {
                const dist = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight;
                if (dist > 80) {
                    btn.classList.remove('opacity-0', 'pointer-events-none');
                    btn.classList.add('opacity-100', 'pointer-events-auto');
                } else {
                    btn.classList.remove('opacity-100', 'pointer-events-auto');
                    btn.classList.add('opacity-0', 'pointer-events-none');
                }
            }
        }

        document.getElementById('scroll-bottom-btn').addEventListener('click', () => {
            autoScrollEnabled = true;
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            updateScrollBtn();
        });

        chatBox.addEventListener('wheel', (e) => {
            if (e.deltaY < 0) autoScrollEnabled = false;
            else if (e.deltaY > 0 && (chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight <= 15)) autoScrollEnabled = true;
            updateScrollBtn();
        }, { passive: true });

        /* ========== 欢迎屏与时间轴高亮 ========== */
        function renderWelcomeScreen() {
            chatBox.innerHTML = `
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center p-6 my-auto opacity-100 transition-opacity duration-300">
                    <div class="w-16 h-16 bg-blue-100/90 rounded-full flex items-center justify-center text-3xl mb-4 shadow-sm border border-white">🏃‍♂️</div>
                    <h2 class="text-xl font-bold text-slate-700 mb-2">你好！我是中长跑 AI 教练</h2>
                    <p class="text-sm text-slate-500 max-w-md leading-relaxed">
                        基于《丹尼尔斯经典跑步训练法》打造。<br>
                        你可以直接向我询问配速规划与训练计划，<br>或上传跑表 CSV 数据进行智能评估分析。
                    </p>
                </div>
            `;
        }

        const bubbleObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const msgId = entry.target.dataset.msgId;
                    if (msgId && entry.target.classList.contains('flex-row-reverse')) {
                        document.querySelectorAll('.timeline-dot').forEach(d => {
                            d.classList.remove('bg-blue-600', 'scale-125', 'shadow-sm');
                            d.classList.add('bg-slate-300');
                        });
                        const activeDot = document.querySelector(`.timeline-dot[data-target-id="${msgId}"]`);
                        if (activeDot) {
                            activeDot.classList.remove('bg-slate-300');
                            activeDot.classList.add('bg-blue-600', 'scale-125', 'shadow-sm');
                        }
                    }
                }
            });
        }, { root: chatBox, rootMargin: '-30% 0px -30% 0px', threshold: 0 });

        /* ========== API 交互层 ========== */
        document.addEventListener('DOMContentLoaded', async () => {
            marked.setOptions({ breaks: true, gfm: true });
            userInput.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight < 120 ? this.scrollHeight : 120) + 'px';
            });
            await loadSessions();
            document.getElementById('new-chat-btn').addEventListener('click', createSession);
        });

        async function loadSessions() {
            try {
                const res = await fetch('/sessions');
                const data = await res.json();
                const list = document.getElementById('session-list');
                list.innerHTML = '';
                if (data.sessions.length === 0) { await createSession(); return; }
                if (!currentThreadId) currentThreadId = data.sessions[0].thread_id;
                
                data.sessions.forEach(s => {
                    const container = document.createElement('div');
                    container.className = `flex items-center w-full rounded-xl border transition-colors ${s.thread_id === currentThreadId ? 'bg-white/80 shadow-sm border-white/60 text-slate-800 font-semibold' : 'hover:bg-white/40 border-transparent text-slate-600'}`;
                    
                    const btn = document.createElement('button');
                    btn.className = `flex-1 text-left px-3 py-2.5 text-sm truncate`;
                    btn.textContent = s.title;
                    btn.onclick = () => { if (window.innerWidth < 768) sidebar.classList.add('hidden'); switchSession(s.thread_id); };

                    const editBtn = document.createElement('button');
                    editBtn.className = `p-1 text-slate-400 hover:text-blue-500 transition-colors text-xs`;
                    editBtn.title = "重命名";
                    editBtn.innerHTML = `✏️`;
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.value = s.title;
                        input.className = 'flex-1 px-2 py-1 text-sm bg-white border border-blue-300 rounded outline-none';
                        const saveTitle = async () => {
                            const newTitle = input.value.trim() || s.title;
                            btn.textContent = newTitle;
                            if (input.parentNode) container.replaceChild(btn, input);
                            if (newTitle !== s.title) {
                                s.title = newTitle;
                                await fetch('/sessions/' + s.thread_id, {
                                    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: newTitle })
                                });
                            }
                        };
                        input.onblur = saveTitle;
                        input.onkeydown = (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); } };
                        container.replaceChild(input, btn);
                        input.focus();
                    };

                    const delBtn = document.createElement('button');
                    delBtn.className = `pr-3 pl-1 text-slate-400 hover:text-red-500 transition-colors`;
                    delBtn.title = "删除对话";
                    delBtn.innerHTML = `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>`;
                    delBtn.onclick = async (e) => {
                        e.stopPropagation();
                        if (confirm('确定要删除该对话吗？')) {
                            await fetch('/sessions/' + s.thread_id, { method: 'DELETE' });
                            if (s.thread_id === currentThreadId) { currentThreadId = null; chatBox.innerHTML = ''; timelineNav.innerHTML = ''; messageCount = 0; }
                            await loadSessions();
                        }
                    };
                    container.appendChild(btn); container.appendChild(editBtn); container.appendChild(delBtn);
                    list.appendChild(container);
                });
                if (messageCount === 0 && !chatBox.innerHTML.trim()) await switchSession(currentThreadId);
            } catch (e) { console.error(e); }
        }

        async function createSession() {
            try {
                const title = '新对话 ' + new Date().toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                const res = await fetch('/sessions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title }) });
                const data = await res.json();
                await switchSession(data.thread_id);
            } catch (e) { console.error(e); }
        }

        async function switchSession(threadId, softRefresh = false) {
            currentThreadId = threadId;
            try {
                const res = await fetch('/history/' + threadId);
                const data = await res.json();
                currentMessages = data.messages || [];
                
                if (!softRefresh) { chatBox.innerHTML = ''; } 
                else { chatBox.querySelectorAll('.flex.items-start').forEach(m => m.remove()); }

                // 核心闭环：重置时间轴，让后续 appendMessage 原地重建
                if (timelineNav) timelineNav.innerHTML = '';
                messageCount = 0;

                const aiMessages = currentMessages.filter(m => m.role === 'ai');
                const lastAiMessageId = aiMessages.length > 0 ? aiMessages[aiMessages.length - 1].id : null;

                currentMessages.forEach(msg => {
                    if (msg.role === 'ai') {
                        const isLastAi = msg.id === lastAiMessageId;
                        const aiBubble = appendMessage('ai', '', true, msg.id, msg.content, isLastAi);
                        const mdContainer = document.createElement('div');
                        mdContainer.className = 'markdown-body';
                        mdContainer.innerHTML = marked.parse(msg.content);
                        aiBubble.appendChild(mdContainer);
                    } else {
                        appendMessage('user', msg.content, false, msg.id, msg.content);
                    }
                });

                if (!currentMessages || currentMessages.length === 0) { renderWelcomeScreen(); }
                if (!softRefresh) await loadSessions();
                
                requestAnimationFrame(() => { setTimeout(() => { chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }); }, 10); });
            } catch (e) { console.error(e); }
        }

        csvUpload.addEventListener('change', async function (e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            fileStatus.className = 'flex flex-wrap items-center gap-1.5';
            fileStatus.innerHTML = '';
            currentFileNames = [];
            
            const readPromises = files.map((file, index) => {
                currentFileNames.push(file.name);
                
                const pill = document.createElement('span');
                pill.className = 'bg-white/80 backdrop-blur-sm border border-slate-200 text-slate-600 px-2 py-0.5 rounded-md text-xs shadow-sm flex items-center gap-1';
                pill.innerHTML = `<svg class="w-3 h-3 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>${file.name}`;
                fileStatus.appendChild(pill);
                
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        resolve(`【附件${index + 1}：${file.name}】\n${event.target.result}`);
                    };
                    reader.readAsText(file);
                });
            });
            
            const results = await Promise.all(readPromises);
            csvStringData = results.join('\n\n');
            
            fileStatus.classList.remove('hidden');
            clearFileBtn.classList.remove('hidden');
        });

        clearFileBtn.addEventListener('click', () => {
            csvUpload.value = ''; csvStringData = ''; currentFileNames = []; fileStatus.innerHTML = ''; fileStatus.classList.add('hidden'); clearFileBtn.classList.add('hidden');
        });

        /* ========== 气泡渲染与 Time Travel ========== */
        function appendMessage(role, content, isHtml = false, msgId = null, rawContent = null, isLastAi = false) {
            const welcomeScreen = document.getElementById('welcome-screen');
            if (welcomeScreen) welcomeScreen.remove();

            const wrapper = document.createElement('div');
            wrapper.className = `flex items-start gap-3 relative group ${role === 'user' ? 'flex-row-reverse' : ''}`;

            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full text-center leading-8 flex-shrink-0 font-bold text-sm shadow-sm backdrop-blur-sm border ${role === 'user' ? 'bg-slate-800/90 text-white border-slate-700/50' : 'bg-blue-100/80 text-blue-600 border-blue-200/50'}`;
            avatar.textContent = role === 'user' ? '我' : 'AI';

            const bubble = document.createElement('div');
            bubble.className = `p-3 rounded-2xl max-w-[85%] shadow-sm backdrop-blur-md border relative ${role === 'user' ? 'bg-slate-800/90 text-white border-slate-700/50 rounded-tr-none whitespace-pre-wrap' : 'bg-white/80 text-slate-800 border-white/50 rounded-tl-none'}`;
            if (isHtml) bubble.innerHTML = content; else bubble.textContent = content;

            if (msgId) {
                bubble.dataset.msgId = msgId;
                if (rawContent) bubble.dataset.rawContent = rawContent;

                const toolbar = document.createElement('div');
                toolbar.className = `absolute -bottom-3 -right-2 hidden group-hover:flex gap-1 items-center bg-white shadow rounded-md px-1 py-0.5 border text-xs z-10`;

                if (role === 'user') {
                    const editBtn = document.createElement('button');
                    editBtn.className = 'text-xs hover:bg-slate-100 text-slate-600 px-1 rounded transition-colors';
                    editBtn.innerHTML = '✎ 编辑';
                    editBtn.onclick = () => enableEditMode(bubble, wrapper, msgId, rawContent);
                    toolbar.appendChild(editBtn);
                    
                    // 自动追加右侧时间轴导航点
                    if (timelineNav) {
                        const dot = document.createElement('div');
                        const snippet = (rawContent || content || '').substring(0, 6);
                        dot.title = snippet + (snippet.length === 6 ? '...' : '');
                        dot.className = 'w-2 h-6 rounded-full bg-slate-300 transition-all duration-300 cursor-pointer flex-shrink-0 hover:bg-blue-400 timeline-dot';
                        dot.dataset.targetId = msgId;
                        dot.onclick = () => { autoScrollEnabled = false; chatBox.scrollTo({ top: wrapper.offsetTop - 20, behavior: 'smooth' }); };
                        timelineNav.appendChild(dot);
                    }

                } else if (role === 'ai') {
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'text-xs hover:bg-slate-100 text-slate-600 px-1 rounded transition-colors';
                    copyBtn.innerHTML = '📄 复制';
                    copyBtn.onclick = () => copySingleTurn(rawContent || content, wrapper, copyBtn);
                    toolbar.appendChild(copyBtn);

                    const imgBtn = document.createElement('button');
                    imgBtn.className = 'text-xs hover:bg-slate-100 text-slate-600 px-1 rounded transition-colors';
                    imgBtn.innerHTML = '📸 长图';
                    imgBtn.onclick = () => exportSingleTurn(wrapper, imgBtn);
                    toolbar.appendChild(imgBtn);

                    if (isLastAi) {
                        const regenBtn = document.createElement('button');
                        regenBtn.className = 'text-xs hover:bg-slate-100 text-slate-600 px-1 rounded transition-colors';
                        regenBtn.innerHTML = '🔄 重试';
                        regenBtn.onclick = () => regenerateAction();
                        toolbar.appendChild(regenBtn);
                    }
                }
                if (toolbar.children.length > 0) bubble.appendChild(toolbar);
            }

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            if (msgId) bubbleObserver.observe(wrapper);

            chatBox.scrollTop = chatBox.scrollHeight;
            if (role === 'user') messageCount++;
            return bubble;
        }

        async function enableEditMode(bubble, wrapper, msgId, oldContent) {
            const originalClass = wrapper.className;
            const originalHTML = wrapper.innerHTML;

            wrapper.className = 'w-full relative my-2';
            wrapper.innerHTML = '';

            const editorCard = document.createElement('div');
            editorCard.className = 'w-full bg-white border-2 border-blue-500 rounded-2xl p-4 shadow-xl transition-all duration-200';
            const textarea = document.createElement('textarea');
            textarea.className = 'w-full bg-transparent border-0 focus:ring-0 focus:outline-none p-0 text-sm md:text-base text-slate-800 leading-relaxed resize-none overflow-hidden';
            textarea.value = oldContent;

            textarea.addEventListener('input', function () {
                this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px';
            });

            const actions = document.createElement('div');
            actions.className = 'flex justify-end items-center gap-2 mt-3 pt-2 border-t border-slate-100';
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'px-4 py-1.5 text-xs font-medium text-slate-500 hover:bg-slate-100 rounded-lg transition-colors';
            cancelBtn.textContent = '取消';
            cancelBtn.onclick = () => {
                wrapper.className = originalClass; wrapper.innerHTML = originalHTML;
                const restoredBubble = wrapper.querySelector('[data-msg-id]');
                const restoredEditBtn = wrapper.querySelector('button');
                if (restoredBubble && restoredEditBtn) restoredEditBtn.onclick = () => enableEditMode(restoredBubble, wrapper, msgId, oldContent);
            };

            const saveBtn = document.createElement('button');
            saveBtn.className = 'px-4 py-1.5 text-xs font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors';
            saveBtn.textContent = '保存并提交';
            saveBtn.onclick = async () => {
                const newText = textarea.value.trim();
                if (!newText) return;
                saveBtn.disabled = true; saveBtn.textContent = '处理中...';
                let sibling = wrapper.nextElementSibling;
                while (sibling) { let next = sibling.nextElementSibling; sibling.remove(); sibling = next; }
                wrapper.remove();
                try {
                    await fetch('/history/' + currentThreadId + '/truncate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ from_message_id: msgId }) });
                    sendMessage(newText);
                } catch (e) { console.error(e); }
            };
            textarea.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveBtn.click(); } });

            actions.appendChild(cancelBtn); actions.appendChild(saveBtn);
            editorCard.appendChild(textarea); editorCard.appendChild(actions);
            wrapper.appendChild(editorCard);

            setTimeout(() => { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; textarea.focus(); textarea.setSelectionRange(textarea.value.length, textarea.value.length); }, 0);
        }

        async function regenerateAction() {
            let lastUserMsg = null;
            for (let i = currentMessages.length - 1; i >= 0; i--) {
                if (currentMessages[i].role === 'user' && currentMessages[i].content) { lastUserMsg = currentMessages[i]; break; }
            }
            if (!lastUserMsg || !lastUserMsg.content) return;
            try {
                await fetch('/history/' + currentThreadId + '/truncate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ from_message_id: lastUserMsg.id }) });
                await switchSession(currentThreadId, true);
                sendMessage(lastUserMsg.content);
            } catch (e) { console.error(e); }
        }

        async function copySingleTurn(aiContent, aiWrapper, btn) {
            const originalText = btn.innerHTML;
            let prevWrapper = aiWrapper.previousElementSibling;
            let userContent = "";
            if (prevWrapper && prevWrapper.classList.contains('flex-row-reverse')) {
                const bubble = prevWrapper.querySelector('.p-3.rounded-2xl');
                if (bubble) userContent = bubble.innerText.trim();
            }
            const fullText = userContent ? `【提问】:\n${userContent}\n\n【AI 教练】:\n${aiContent.trim()}` : `【AI 教练】:\n${aiContent.trim()}`;
            try { await navigator.clipboard.writeText(fullText); btn.innerHTML = "✅"; } catch (e) { btn.innerHTML = "❌"; }
            setTimeout(() => btn.innerHTML = originalText, 2000);
        }

        async function exportSingleTurn(aiWrapper, btn) {
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳"; btn.disabled = true;
            let prevWrapper = aiWrapper.previousElementSibling;
            if (prevWrapper && !prevWrapper.classList.contains('flex-row-reverse')) prevWrapper = null;

            const tempContainer = document.createElement('div');
            tempContainer.style.cssText = 'position:absolute;left:-9999px;width:' + chatBox.clientWidth + 'px;padding:20px;background:#f8fafc;display:flex;flex-direction:column;gap:1rem;';
            if (prevWrapper) tempContainer.appendChild(prevWrapper.cloneNode(true));
            
            const cloneAi = aiWrapper.cloneNode(true);
            const toolbar = cloneAi.querySelector('.absolute.-bottom-3');
            if (toolbar) toolbar.remove();
            tempContainer.appendChild(cloneAi);
            document.body.appendChild(tempContainer);

            try {
                const canvas = await html2canvas(tempContainer, { scale: 2, backgroundColor: "#f8fafc", useCORS: true });
                const link = document.createElement('a');
                link.download = `单轮截屏_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                btn.innerHTML = "✅";
            } catch (err) { btn.innerHTML = "❌"; } 
            finally {
                document.body.removeChild(tempContainer);
                setTimeout(() => { btn.innerHTML = originalText; btn.disabled = false; }, 2000);
            }
        }

        /* ========== 流式发信逻辑 ========== */
        async function sendMessage(overrideText = null) {
            let text = typeof overrideText === 'string' ? overrideText : userInput.value.trim();
            if (!text && !csvStringData) return;
            const displayPrompt = csvStringData && !overrideText ? `📎 ${currentFileNames.join(', ')}\n${text}` : text;
            appendMessage('user', displayPrompt);
            if (typeof overrideText !== 'string') { userInput.value = ''; userInput.style.height = 'auto'; }

            const finalPrompt = csvStringData && !overrideText ? `${csvStringData}\n\n【提问】\n${text}` : text;
            sendBtn.disabled = true; sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            const aiBubble = appendMessage('ai', '', true);
            aiBubble.classList.add('typing-indicator');
            const mdContainer = document.createElement('div');
            mdContainer.className = 'markdown-body';
            aiBubble.appendChild(mdContainer);

            let toolStatusDiv = null; let currentText = '';
            autoScrollEnabled = true; isGenerating = true; updateScrollBtn();
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: finalPrompt, thread_id: currentThreadId })
                });
                if (!response.ok) throw new Error('网络请求失败');
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') {
                                sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                                sendBtn.disabled = false;
                                if (messageCount === 1) setTimeout(() => loadSessions(), 1000);
                                return;
                            }
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.type === 'token') {
                                    currentText += data.content;
                                    mdContainer.innerHTML = marked.parse(currentText);
                                } else if (data.type === 'tool_start') {
                                    if (!toolStatusDiv) {
                                        toolStatusDiv = document.createElement('div');
                                        toolStatusDiv.className = 'text-xs text-blue-500 bg-blue-100/50 p-2 rounded mt-2 mb-2 italic border border-blue-200';
                                        aiBubble.insertBefore(toolStatusDiv, mdContainer);
                                    }
                                    toolStatusDiv.textContent = data.content;
                                } else if (data.type === 'tool_end') {
                                    if (toolStatusDiv) {
                                        toolStatusDiv.textContent = data.content;
                                        setTimeout(() => { if (toolStatusDiv) { toolStatusDiv.remove(); toolStatusDiv = null; } }, 2000);
                                    }
                                } else if (data.type === 'error') {
                                    currentText += `\n\n**[错误: ${data.content}]**`;
                                    mdContainer.innerHTML = marked.parse(currentText);
                                }
                            } catch (e) { console.error('Parse Error:', e, dataStr); }
                            
                            if (autoScrollEnabled) chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                }
            } catch (err) {
                aiBubble.classList.remove('typing-indicator');
                currentText += `\n\n**[连接出错: ${err.message}]**`;
                mdContainer.innerHTML = marked.parse(currentText);
            } finally {
                isGenerating = false; updateScrollBtn();
                aiBubble.classList.remove('typing-indicator');
                sendBtn.disabled = false; sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                if (currentThreadId) await switchSession(currentThreadId, true);
            }
        }

        sendBtn.addEventListener('click', () => sendMessage());
        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    </script>
</body>
